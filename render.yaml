services:
  - type: web
    name: ka-criacoes-agente-whatsapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn agente_whatsapp:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        value: kacriacoes2026
